services:

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    ports:
      # Loopback only — not reachable from other devices on Wi‑Fi/LAN
      - "127.0.0.1:3000:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
      AUTH_SECRET: ${AUTH_SECRET:-local-dev-secret-change-me}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-secret-change-me}
      NEXTAUTH_URL: http://localhost:3000
      # Auth.js rejects localhost session calls in Docker without this
      AUTH_TRUST_HOST: "true"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: runtime
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/neighborhoodiq
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:-local-dev-api-jwt-change-me}
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neighborhoodiq
    ports:
      # Host 5433 avoids clashing with a local Postgres on 5432; loopback-only
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  worker-epa:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/neighborhoodiq
      EPA_AQS_EMAIL: ${EPA_AQS_EMAIL:-}
      EPA_AQS_KEY: ${EPA_AQS_KEY:-}
    command: python -m ingest.epa.run
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - workers

  worker-census:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/neighborhoodiq
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
    command: python -m ingest.census.run
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - workers

  worker-cms:
