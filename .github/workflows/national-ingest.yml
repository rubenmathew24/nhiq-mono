name: National ingest

# Manual trigger only — does NOT run on push to master/dev (Deploy is separate).
# Optionally rebuilds neighborhoodiq-worker:dev when workers/ (or worker Dockerfile)
# changed since the SHA baked into the current :dev image (skipped on chain redispatch).
on:
  workflow_dispatch:
    inputs:
      continuous:
        description: Continuous mode (ORCH_CONTINUOUS=1) — loop until nation complete
        required: false
        default: "true"
        type: boolean
      max_states:
        description: Max states this run when continuous=false (ORCH_MAX_STATE_UNITS)
        required: false
        default: "5"
      batch_states:
        description: Max gap states per worker execution (ORCH_BATCH_STATES)
        required: false
        default: "10"
      state_filter:
        description: Optional comma-separated state FIPS (e.g. 44 or 44,09)
        required: false
        default: ""
      force_states:
        description: Optional comma-separated state FIPS to force full re-ingest (bypass skip-done)
        required: false
        default: ""
      state_exclude:
        description: Optional comma-separated state FIPS to skip (blacklist); force_states overrides
        required: false
        default: ""
      chain_depth:
        description: Auto-incremented self-redispatch depth (do not set manually)
        required: false
        default: "0"
      force_worker_rebuild:
        description: Force rebuild/push of neighborhoodiq-worker:dev even if workers/ unchanged
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  detect-worker:
    name: Detect worker image update
    runs-on: ubuntu-latest
    outputs:
      need_build: ${{ steps.detect.outputs.need_build }}
      previous_sha: ${{ steps.detect.outputs.previous_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether workers/ changed since image SHA
        id: detect
        env:
          CHAIN_DEPTH: ${{ github.event.inputs.chain_depth }}
          FORCE_REBUILD: ${{ github.event.inputs.force_worker_rebuild }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          DEPTH="${CHAIN_DEPTH:-0}"
          if [ "$DEPTH" != "0" ]; then
            echo "chain_depth=$DEPTH — skip worker rebuild on self-redispatch"
            echo "need_build=false" >> "$GITHUB_OUTPUT"
            echo "previous_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FORCE_RAW="${FORCE_REBUILD:-false}"
          case "${FORCE_RAW,,}" in
            1|true|yes)
              echo "force_worker_rebuild=true"
              echo "need_build=true" >> "$GITHUB_OUTPUT"
              echo "previous_sha=" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [ -z "${ACR_LOGIN_SERVER:-}" ] || [ -z "${ACR_USERNAME:-}" ] || [ -z "${ACR_PASSWORD:-}" ]; then
            echo "::error::ACR_LOGIN_SERVER / ACR_USERNAME / ACR_PASSWORD secrets required for worker image detect"
            exit 1
          fi

          echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin
          IMG="${ACR_LOGIN_SERVER}/neighborhoodiq-worker:dev"
          PREV=""
          if docker buildx imagetools inspect "$IMG" --format '{{json .}}' > /tmp/worker-img.json 2>/tmp/worker-img.err; then
            PREV=$(python3 <<'PY'
          import json
          data = json.load(open("/tmp/worker-img.json"))
          candidates = []
          def walk(o):
              if isinstance(o, dict):
                  for k, v in o.items():
                      if k in ("org.opencontainers.image.revision", "org.opencontainers.image.revision".lower()) and isinstance(v, str):
                          candidates.append(v)
                      if k in ("Labels", "labels", "annotations") and isinstance(v, dict):
                          for lk, lv in v.items():
                              if "revision" in str(lk).lower() and isinstance(lv, str):
                                  candidates.append(lv)
                      walk(v)
              elif isinstance(o, list):
                  for i in o:
                      walk(i)
          walk(data)
          print(candidates[0] if candidates else "")
          PY
            )
          else
            echo "Could not inspect $IMG (missing or inaccessible) — will build"
            cat /tmp/worker-img.err || true
          fi

          echo "previous_sha=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Image revision label: '${PREV:-<none>}' ; HEAD=$HEAD_SHA"

          if [ -z "$PREV" ]; then
            echo "need_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            echo "Previous image SHA not in this clone — will build"
            echo "need_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$PREV" "$HEAD_SHA" -- workers/ docker/worker.Dockerfile || true)
          if [ -n "$CHANGED" ]; then
            echo "Worker paths changed since $PREV:"
            printf '%s\n' "$CHANGED"
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No workers/ or docker/worker.Dockerfile changes since $PREV — skip rebuild"
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-worker:
    name: Build & push worker image
    runs-on: ubuntu-latest
    needs: detect-worker
    if: needs.detect-worker.outputs.need_build == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push neighborhoodiq-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-worker:dev
            ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-worker:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  orchestrate:
    name: Start niq-worker-orchestrate
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: [detect-worker, build-worker]
    if: |
      always() &&
      needs.detect-worker.result == 'success' &&
      (needs.build-worker.result == 'success' || needs.build-worker.result == 'skipped')
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Guard chain depth
        env:
          CHAIN_DEPTH: ${{ github.event.inputs.chain_depth }}
        run: |
          set -euo pipefail
          DEPTH="${CHAIN_DEPTH:-0}"
          if [ "$DEPTH" -gt 50 ]; then
            echo "chain_depth=$DEPTH exceeds safety limit 50 — stop auto-chaining"
            echo "Remaining work needs a new manual dispatch or investigation."
            exit 1
          fi
          echo "chain_depth=$DEPTH"

      - name: Configure orchestrator inputs + SP env
        env:
          CONTINUOUS: ${{ github.event.inputs.continuous }}
          MAX_STATES: ${{ github.event.inputs.max_states }}
          BATCH_STATES: ${{ github.event.inputs.batch_states }}
          STATE_FILTER: ${{ github.event.inputs.state_filter }}
          FORCE_STATES: ${{ github.event.inputs.force_states }}
          STATE_EXCLUDE: ${{ github.event.inputs.state_exclude }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, subprocess
          creds = json.loads(os.environ["AZURE_CREDENTIALS"])
          client_id = creds.get("clientId") or creds.get("appId")
          secret = creds.get("clientSecret") or creds.get("password")
          tenant = creds.get("tenantId") or creds.get("tenant")
          sub = creds.get("subscriptionId")
          if not all([client_id, secret, tenant, sub]):
              raise SystemExit(f"AZURE_CREDENTIALS missing fields: {sorted(creds)}")
          continuous_raw = (os.environ.get("CONTINUOUS") or "true").strip().lower()
          continuous = continuous_raw in ("1", "true", "yes")
          max_states = os.environ.get("MAX_STATES") or "5"
          batch_states = os.environ.get("BATCH_STATES") or "10"
          state_filter = os.environ.get("STATE_FILTER") or ""
          force_states = os.environ.get("FORCE_STATES") or ""
          state_exclude = os.environ.get("STATE_EXCLUDE") or ""
          rg = os.environ["AZURE_RESOURCE_GROUP"]
          env_vars = [
              f"ORCH_CONTINUOUS={'1' if continuous else '0'}",
              f"ORCH_MAX_STATE_UNITS={max_states}",
              f"ORCH_BATCH_STATES={batch_states}",
              "ORCH_TIME_BUDGET_SECONDS=20700",
              f"ORCH_STATE_FILTER={state_filter}",
              f"ORCH_FORCE_STATES={force_states}",
              f"ORCH_STATE_EXCLUDE={state_exclude}",
              f"AZURE_RESOURCE_GROUP={rg}",
              f"AZURE_SUBSCRIPTION_ID={sub}",
              f"AZURE_TENANT_ID={tenant}",
              f"AZURE_CLIENT_ID={client_id}",
              f"AZURE_CLIENT_SECRET={secret}",
          ]
          cmd = [
              "az", "containerapp", "job", "update",
              "--name", "niq-worker-orchestrate",
              "--resource-group", rg,
              "--set-env-vars", *env_vars,
              "-o", "none",
          ]
          subprocess.check_call(cmd)
          print(
              f"Orchestrator env updated continuous={continuous} "
              f"batch_states={batch_states}"
          )
          PY

      - name: Poll / chain orchestrator until complete
        env:
          GH_TOKEN: ${{ github.token }}
          CONTINUOUS: ${{ github.event.inputs.continuous }}
          MAX_STATES: ${{ github.event.inputs.max_states }}
          BATCH_STATES: ${{ github.event.inputs.batch_states }}
          STATE_FILTER: ${{ github.event.inputs.state_filter }}
          FORCE_STATES: ${{ github.event.inputs.force_states }}
          STATE_EXCLUDE: ${{ github.event.inputs.state_exclude }}
          FORCE_WORKER_REBUILD: ${{ github.event.inputs.force_worker_rebuild }}
          CHAIN_DEPTH: ${{ github.event.inputs.chain_depth }}
        run: |
          set -euo pipefail
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          JOB=niq-worker-orchestrate
          WORKFLOW_START=$(date +%s)
          # Leave ~25 minutes for self-redispatch before job timeout (350m).
          WORKFLOW_BUDGET_SECONDS=$((325 * 60))
          CONTINUOUS_RAW="${CONTINUOUS:-true}"
          CONTINUOUS=0
          case "${CONTINUOUS_RAW,,}" in
            1|true|yes) CONTINUOUS=1 ;;
          esac

          CONTAINER=$(az containerapp job show \
            --name "$JOB" \
            --resource-group "$RG" \
            --query "properties.template.containers[0].name" -o tsv 2>/dev/null || true)
          if [ -z "${CONTAINER:-}" ]; then
            CONTAINER="$JOB"
          fi

          INTERESTING='Exclude states|Will process states|Force states|Inventory summary|State |orch_|Final inventory|national_progress'

          start_execution() {
            local OUT NAME
            OUT=$(az containerapp job start --name "$JOB" --resource-group "$RG" -o json)
            NAME=$(echo "$OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('name',''))")
            if [ -z "$NAME" ]; then
              echo "Failed to start orchestrator execution"
              exit 1
            fi
            echo "$NAME"
          }

          dump_progress() {
            local EXECUTION="$1"
            local SEEN_FILE="$2"
            local tail_n="$3"
            local raw matched new_lines last
            raw=$(az containerapp job logs show \
              --name "$JOB" \
              --resource-group "$RG" \
              --execution "$EXECUTION" \
              --container "$CONTAINER" \
              --tail "$tail_n" 2>/dev/null || true)
            if [ -z "$raw" ]; then
              echo "last_activity=(orchestrator logs not available yet)"
              return 0
            fi
            matched=$(printf '%s\n' "$raw" | grep -E "$INTERESTING" || true)
            if [ -z "$matched" ]; then
              echo "last_activity=(no orch progress lines in last $tail_n log lines yet)"
              return 0
            fi
            new_lines=$(printf '%s\n' "$matched" | while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              if ! grep -Fxq -- "$line" "$SEEN_FILE" 2>/dev/null; then
                printf '%s\n' "$line" >> "$SEEN_FILE"
                printf '%s\n' "$line"
              fi
            done)
            if [ -n "$new_lines" ]; then
              echo "--- new orchestrator progress ---"
              printf '%s\n' "$new_lines"
              echo "---"
            fi
            last=$(printf '%s\n' "$matched" | tail -n 1)
            echo "last_activity=$last"
          }

          cycle_result_from_logs() {
            local EXECUTION="$1"
            local raw
            raw=$(az containerapp job logs show \
              --name "$JOB" \
              --resource-group "$RG" \
              --execution "$EXECUTION" \
              --container "$CONTAINER" \
              --tail 200 2>/dev/null || true)
            if printf '%s\n' "$raw" | grep -q 'orch_cycle_result=complete'; then
              echo complete
              return 0
            fi
            if printf '%s\n' "$raw" | grep -q 'orch_cycle_result=more_work'; then
              echo more_work
              return 0
            fi
            echo unknown
          }

          redispatch_workflow() {
            local next_depth=$(( ${CHAIN_DEPTH:-0} + 1 ))
            echo "Self-redispatching national-ingest.yml chain_depth=$next_depth"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/workflows/national-ingest.yml/dispatches" \
              -f ref="${{ github.ref_name }}" \
              -f "inputs[continuous]=${CONTINUOUS_RAW}" \
              -f "inputs[max_states]=${MAX_STATES}" \
              -f "inputs[batch_states]=${BATCH_STATES}" \
              -f "inputs[state_filter]=${STATE_FILTER}" \
              -f "inputs[force_states]=${FORCE_STATES}" \
              -f "inputs[state_exclude]=${STATE_EXCLUDE}" \
              -f "inputs[force_worker_rebuild]=false" \
              -f "inputs[chain_depth]=${next_depth}"
            echo "Handed off to new workflow run (chain_depth=$next_depth)"
          }

          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - WORKFLOW_START))
            if [ "$ELAPSED" -ge "$WORKFLOW_BUDGET_SECONDS" ]; then
              if [ "$CONTINUOUS" = "1" ]; then
                redispatch_workflow
                exit 0
              fi
              echo "Workflow time budget hit in bounded mode"
              exit 1
            fi

            EXECUTION=$(start_execution)
            echo "Started execution: $EXECUTION"
            SEEN_FILE=$(mktemp)
            CYCLE_DONE=0
            for i in $(seq 1 700); do
              NOW=$(date +%s)
              ELAPSED=$((NOW - WORKFLOW_START))
              if [ "$ELAPSED" -ge "$WORKFLOW_BUDGET_SECONDS" ]; then
                echo "Workflow approaching timeout while polling $EXECUTION"
                if [ "$CONTINUOUS" = "1" ]; then
                  redispatch_workflow
                  exit 0
                fi
                exit 1
              fi

              ST=$(az containerapp job execution show \
                --name "$JOB" \
                --resource-group "$RG" \
                --job-execution-name "$EXECUTION" \
                --query "properties.status" -o tsv)
              echo "poll=$i status=$ST"
              dump_progress "$EXECUTION" "$SEEN_FILE" 80 || true

              if [ "$ST" = "Succeeded" ] || [ "$ST" = "Failed" ] || [ "$ST" = "Stopped" ]; then
                RESULT=$(cycle_result_from_logs "$EXECUTION")
                echo "execution_terminal status=$ST cycle_result=$RESULT"
                if [ "$RESULT" = "complete" ]; then
                  if [ "$ST" = "Succeeded" ]; then
                    exit 0
                  fi
                  echo "Nation complete signal with status=$ST"
                  exit 1
                fi
                if [ "$CONTINUOUS" != "1" ]; then
                  if [ "$ST" = "Succeeded" ]; then
                    exit 0
                  fi
                  az containerapp job logs show \
                    --name "$JOB" --resource-group "$RG" \
                    --execution "$EXECUTION" --container "$CONTAINER" \
                    --tail 200 2>/dev/null || true
                  exit 1
                fi
                # Continuous: more_work or unknown with Failed → hard fail; else chain execution.
                if [ "$ST" = "Failed" ] && [ "$RESULT" != "more_work" ]; then
                  echo "Orchestrator hard-failed without more_work signal"
                  az containerapp job logs show \
                    --name "$JOB" --resource-group "$RG" \
                    --execution "$EXECUTION" --container "$CONTAINER" \
                    --tail 200 2>/dev/null || true
                  exit 1
                fi
                echo "Chaining new orchestrator execution (more work remains)"
                CYCLE_DONE=1
                break
              fi
              sleep 30
            done
            rm -f "$SEEN_FILE"
            if [ "$CYCLE_DONE" != "1" ]; then
              echo "Timed out waiting for orchestrator execution"
              if [ "$CONTINUOUS" = "1" ]; then
                redispatch_workflow
                exit 0
              fi
              exit 1
            fi
          done
