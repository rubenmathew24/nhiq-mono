name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Fail fast if the public API URL secret was not updated for nh-iq.com.
      # (NEXT_PUBLIC_* is baked into the web image at build time.)
      - name: Verify NEXT_PUBLIC_API_URL host
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          case "$NEXT_PUBLIC_API_URL" in
            https://api.nh-iq.com|https://api.nh-iq.com/)
              echo "NEXT_PUBLIC_API_URL host OK (api.nh-iq.com)"
              ;;
            *)
              echo "::error::NEXT_PUBLIC_API_URL must be https://api.nh-iq.com (got a different value). Update the repo Actions secret and re-run."
              exit 1
              ;;
          esac

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web.Dockerfile
          target: runner
          platforms: linux/amd64
          push: true
          # One-shot: ignore GHA layer cache so a corrected NEXT_PUBLIC_API_URL
          # cannot be skipped by a stale Next.js build layer.
          no-cache: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-web:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_API }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-api:${{ needs.build-and-push.outputs.image_tag }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-api]

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Web Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_WEB }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/neighborhoodiq-web:${{ needs.build-and-push.outputs.image_tag }}
